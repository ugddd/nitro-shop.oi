<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مدير شارات HypeSquad</title>
    <link rel="icon" type="image/png" href="https://i.postimg.cc/mg8JJZCC/unnamed.webp">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&family=Changa:wght@700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&family=Changa:wght@400;600;700;800&display=swap');

        :root {
            --primary: #cc00ff;
            --secondary: #cc00ff;
            --dark: #0f0f0f;
            --darker: #1a1a1a;
            --light: #ffffff;
            --muted: #b9bbbe;
            --success: #43b581;
            --danger: #ED4245;
        }

        * {
            font-family: 'Cairo', 'Changa', sans-serif;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0f0f0f 0%, #1a1a1a 50%, #2d2d2d 100%);
            color: var(--light);
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 20% 20%, rgba(183, 0, 255, 0.3) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(114, 137, 218, 0.2) 0%, transparent 50%);
            animation: backgroundShift 20s ease-in-out infinite;
            pointer-events: none;
            z-index: -2;
        }

        @keyframes backgroundShift {
            0%, 100% { 
                background: 
                    radial-gradient(circle at 20% 20%, rgba(216, 88, 242, 0.3) 0%, transparent 50%),
                    radial-gradient(circle at 80% 80%, rgba(114, 137, 218, 0.2) 0%, transparent 50%);
            }
            50% { 
                background: 
                    radial-gradient(circle at 80% 30%, rgba(212, 0, 255, 0.5) 0%, transparent 50%),
                    radial-gradient(circle at 20% 70%, rgba(114, 137, 218, 0.3) 0%, transparent 50%);
            }
        }

        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
        }

        .particle {
            position: absolute;
            width: 2px;
            height: 2px;
            background: var(--primary);
            border-radius: 50%;
            animation: float 15s infinite linear;
            opacity: 0.6;
        }

        @keyframes float {
            0% {
                transform: translateY(100vh) translateX(0) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 0.6;
            }
            90% {
                opacity: 0.6;
            }
            100% {
                transform: translateY(-100vh) translateX(100px) rotate(360deg);
                opacity: 0;
            }
        }

        .container {
            max-width: 900px;
            margin: 30px auto;
            position: relative;
            z-index: 1;
            padding: 0 20px;
        }

        .header-section {
            text-align: center;
            margin-bottom: 3rem;
        }

        .logo {
            width: 120px;
            height: 120px;
            margin: 0 auto 2rem;
            animation: logoFloat 4s ease-in-out infinite, logoGlow 2s ease-in-out infinite alternate;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid transparent;
            background: linear-gradient(45deg, var(--primary), var(--secondary)) padding-box,
                       linear-gradient(45deg, var(--primary), var(--secondary)) border-box;
            box-shadow: 
                0 0 30px rgba(204, 0, 255, 0.5),
                0 0 60px rgba(204, 0, 255, 0.3),
                inset 0 0 20px rgba(255, 255, 255, 0.1);
            position: relative;
        }

        @keyframes logoSpin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .logo::before {
            content: '';
            position: absolute;
            top: -6px;
            left: -6px;
            right: -6px;
            bottom: -6px;
            background: linear-gradient(45deg, var(--primary), var(--secondary));
            border-radius: 50%;
            z-index: -1;
            opacity: 0.7;
        }

        @keyframes logoFloat {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
        }

        @keyframes logoGlow {
            0% { filter: brightness(1); }
            100% { filter: brightness(1.2); }
        }

        .header-section h1 {
            font-size: 2.5rem;
            font-weight: 700;
            letter-spacing: 1px;
            background: linear-gradient(135deg, #cc00ff 0%, #ff006e 50%, #cc00ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: none;
            margin-bottom: 0.5rem;
            font-family: 'Changa', 'Cairo', sans-serif;
            animation: textGlow 3s ease-in-out infinite;
            filter: drop-shadow(0 0 10px rgba(204, 0, 255, 0.4));
        }

        @keyframes textGlow {
            0%, 100% { filter: drop-shadow(0 0 10px rgba(204, 0, 255, 0.4)); }
            50% { filter: drop-shadow(0 0 20px rgba(204, 0, 255, 0.8)); }
        }

        .header-section p {
            color: var(--muted);
            font-size: 1.1rem;
            animation: fadeInScale 0.8s ease-out;
        }

        @keyframes fadeInScale {
            from {
                opacity: 0;
                transform: scale(0.9);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .card {
            background: linear-gradient(135deg, 
                rgba(204, 0, 255, 0.1) 0%, 
                rgba(255, 0, 110, 0.05) 50%, 
                rgba(204, 0, 255, 0.02) 100%);
            backdrop-filter: blur(20px) saturate(180%);
            border: 2px solid rgba(204, 0, 255, 0.3);
            border-radius: 20px;
            box-shadow: 
                0 20px 40px rgba(0, 0, 0, 0.4),
                0 0 0 1px rgba(204, 0, 255, 0.2),
                inset 0 1px 0 rgba(255, 255, 255, 0.2),
                0 0 20px rgba(204, 0, 255, 0.1);
            position: relative;
            overflow: hidden;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            margin-bottom: 2rem;
            animation: cardEnter 0.6s ease-out forwards;
        }

        @keyframes cardEnter {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(204, 0, 255, 0.2), transparent);
            transition: left 0.8s ease;
        }

        .card:hover::before {
            left: 100%;
        }

        .card:hover {
            transform: translateY(-8px) scale(1.02);
            border-color: rgba(204, 0, 255, 0.6);
            box-shadow: 
                0 30px 60px rgba(0, 0, 0, 0.5),
                0 0 0 1px rgba(204, 0, 255, 0.4),
                inset 0 1px 0 rgba(255, 255, 255, 0.3),
                0 0 40px rgba(204, 0, 255, 0.3);
        }

        .card-header {
            background: linear-gradient(135deg, rgba(204, 0, 255, 0.1), rgba(255, 0, 110, 0.05));
            border-bottom: 2px solid rgba(204, 0, 255, 0.3);
            padding: 20px;
            font-family: 'Changa', 'Cairo', sans-serif;
            position: relative;
        }

        .card-header::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(204, 0, 255, 0.5), transparent);
        }

        .card-header h3 {
            color: #cc00ff;
            font-weight: 700;
            margin: 0;
            font-size: 1.2rem;
            letter-spacing: 0.5px;
        }

        .card-body {
            padding: 30px 20px;
        }

        .form-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--light);
        }

        .input-wrapper {
            position: relative;
        }

        input[type="password"],
        input[type="text"] {
            width: 100%;
            padding: 12px 50px 12px 15px;
            border: 2px solid rgba(204, 0, 255, 0.2);
            border-radius: 10px;
            font-size: 14px;
            transition: all 0.3s ease;
            background: rgba(204, 0, 255, 0.05);
            color: var(--light);
            font-family: inherit;
        }

        input:focus {
            outline: none;
            border-color: #cc00ff;
            background: rgba(204, 0, 255, 0.1);
            box-shadow: 0 0 0 3px rgba(204, 0, 255, 0.25), 0 0 20px rgba(204, 0, 255, 0.2);
            transform: translateY(-2px);
        }

        .toggle-btn {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            font-size: 18px;
            cursor: pointer;
            padding: 5px;
            color: var(--muted);
            transition: all 0.2s ease;
            padding: 8px;
            border-radius: 6px;
        }

        .toggle-btn:hover {
            color: #cc00ff;
            background: rgba(204, 0, 255, 0.1);
            transform: translateY(-50%) scale(1.1);
        }

        .profile-section {
            margin-bottom: 25px;
            display: none;
        }

        .profile-section.show {
            display: block;
            animation: slideIn 0.3s ease-out;
        }

        .profile-card {
            background: linear-gradient(135deg, rgba(204, 0, 255, 0.1), rgba(255, 0, 110, 0.05));
            border: 2px solid #cc00ff;
            border-radius: 12px;
            padding: 15px;
            display: flex;
            align-items: center;
            gap: 15px;
            box-shadow: 0 0 20px rgba(204, 0, 255, 0.3);
            animation: profileSlideIn 0.5s ease-out;
        }

        @keyframes profileSlideIn {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .profile-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: 2px solid #cc00ff;
            box-shadow: 0 0 20px rgba(204, 0, 255, 0.5);
            animation: avatarGlow 2s ease-in-out infinite;
        }

        @keyframes avatarGlow {
            0%, 100% { box-shadow: 0 0 20px rgba(204, 0, 255, 0.5); }
            50% { box-shadow: 0 0 30px rgba(204, 0, 255, 0.8); }
        }

        .profile-info {
            flex: 1;
        }

        .profile-label {
            font-size: 12px;
            color: var(--muted);
            margin-bottom: 2px;
        }

        .profile-info h3 {
            margin: 0;
            color: var(--light);
            font-size: 18px;
        }

        .logout-btn {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 18px;
            opacity: 0.6;
            color: var(--light);
            transition: all 0.2s ease;
            padding: 8px;
            border-radius: 6px;
        }

        .logout-btn:hover {
            opacity: 1;
            background: rgba(237, 66, 69, 0.1);
            color: #ff006e;
            transform: scale(1.15);
        }

        .badge-selection {
            margin-bottom: 25px;
        }

        .badge-selection h3 {
            margin-bottom: 15px;
            color: var(--light);
            font-weight: 600;
        }

        .badge-options {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
        }

        .badge-option {
            flex: 1;
            padding: 20px 10px;
            border: 2px solid rgba(204, 0, 255, 0.2);
            border-radius: 12px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            background: rgba(255, 255, 255, 0.02);
            position: relative;
            overflow: hidden;
        }

        .badge-option::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(204, 0, 255, 0.2) 0%, transparent 70%);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .badge-option:hover {
            border-color: rgba(204, 0, 255, 0.6);
            transform: translateY(-8px) scale(1.05);
            box-shadow: 0 15px 40px rgba(204, 0, 255, 0.3);
            background: rgba(204, 0, 255, 0.1);
        }

        .badge-option:hover::after {
            opacity: 1;
        }

        .badge-option.selected {
            border-color: #cc00ff;
            background: linear-gradient(135deg, rgba(204, 0, 255, 0.3), rgba(255, 0, 110, 0.2));
            color: var(--light);
            transform: translateY(-8px) scale(1.05);
            box-shadow: 
                0 15px 40px rgba(204, 0, 255, 0.4),
                inset 0 1px 0 rgba(255, 255, 255, 0.2),
                0 0 30px rgba(204, 0, 255, 0.3);
        }

        .badge-icon img {
            width: 64px;
            height: 64px;
            object-fit: contain;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            filter: drop-shadow(0 0 5px rgba(204, 0, 255, 0.3));
        }

        .badge-option:hover .badge-icon img {
            transform: scale(1.25) rotate(8deg);
            filter: drop-shadow(0 0 15px rgba(204, 0, 255, 0.6));
        }

        .badge-option span {
            font-size: 12px;
            font-weight: 500;
            display: block;
            color: var(--light);
            transition: all 0.3s ease;
        }

        .badge-option:hover span {
            color: #cc00ff;
            font-weight: 700;
        }

        .action-buttons {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
        }

        .btn {
            flex: 1;
            padding: 12px 20px;
            border: none;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            position: relative;
            overflow: hidden;
            font-family: inherit;
        }

        .btn-add {
            background: linear-gradient(135deg, #cc00ff 0%, #ff006e 100%);
            color: var(--light);
            box-shadow: 0 4px 15px rgba(204, 0, 255, 0.4);
            position: relative;
            overflow: hidden;
        }

        .btn-add::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            transition: left 0.6s ease;
        }

        .btn-add:hover::before {
            left: 100%;
        }

        .btn-add:hover:not(:disabled) {
            transform: translateY(-4px);
            box-shadow: 0 8px 25px rgba(204, 0, 255, 0.6);
        }

        .btn-add:disabled {
            background: rgba(255, 255, 255, 0.1);
            cursor: not-allowed;
            color: var(--muted);
        }

        .btn-remove {
            background: linear-gradient(135deg, #ED4245 0%, #ff0040 100%);
            color: var(--light);
            box-shadow: 0 4px 15px rgba(237, 66, 69, 0.4);
            position: relative;
            overflow: hidden;
        }

        .btn-remove::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            transition: left 0.6s ease;
        }

        .btn-remove:hover::before {
            left: 100%;
        }

        .btn-remove:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 25px rgba(237, 66, 69, 0.6);
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: left 0.5s;
        }

        .btn:hover::before {
            left: 100%;
        }

        .status {
            margin-bottom: 20px;
            padding: 12px 15px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            text-align: center;
            animation: statusSlide 0.4s ease-out;
            display: none;
            border-left: 4px solid transparent;
        }

        @keyframes statusSlide {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .status.show {
            display: block;
        }

        .status.success {
            background: rgba(67, 181, 129, 0.15);
            color: var(--success);
            border: 1px solid rgba(67, 181, 129, 0.3);
            border-left-color: var(--success);
            box-shadow: 0 0 20px rgba(67, 181, 129, 0.2);
        }

        .status.error {
            background: rgba(237, 66, 69, 0.15);
            color: var(--danger);
            border: 1px solid rgba(237, 66, 69, 0.3);
            border-left-color: var(--danger);
            box-shadow: 0 0 20px rgba(237, 66, 69, 0.2);
        }

        .status.info {
            background: rgba(204, 0, 255, 0.15);
            color: #cc00ff;
            border: 1px solid rgba(204, 0, 255, 0.3);
            border-left-color: #cc00ff;
            box-shadow: 0 0 20px rgba(204, 0, 255, 0.2);
        }

        .loading {
            display: none;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 15px;
            background: rgba(204, 0, 255, 0.08);
            border-radius: 8px;
            font-size: 14px;
            color: var(--muted);
            border: 1px solid rgba(204, 0, 255, 0.2);
            animation: loadingPulse 2s ease-in-out infinite;
        }

        @keyframes loadingPulse {
            0%, 100% { opacity: 0.8; }
            50% { opacity: 1; }
        }

        .loading.show {
            display: flex;
        }

        .spinner {
            width: 20px;
            height: 20px;
            border: 2px solid rgba(204, 0, 255, 0.2);
            border-top: 2px solid #cc00ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .footer {
            background: rgba(204, 0, 255, 0.1);
            padding: 20px;
            text-align: center;
            font-size: 12px;
            color: var(--muted);
            line-height: 1.5;
            border-top: 2px solid rgba(204, 0, 255, 0.2);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.1);
        }

        .footer p {
            margin: 0;
            animation: fadeInUp 0.8s ease-out;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .footer strong {
            color: #ff006e;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* تأثيرات احترافية */
        .ripple {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            transform: scale(0);
            animation: rippleEffect 0.6s linear;
            pointer-events: none;
        }

        @keyframes rippleEffect {
            to {
                transform: scale(2);
                opacity: 0;
            }
        }

        @media (max-width: 480px) {
            .container {
                padding: 15px;
            }

            .header-section h1 {
                font-size: 1.8rem;
            }

            .badge-options {
                flex-direction: column;
                gap: 10px;
            }

            .action-buttons {
                flex-direction: column;
                gap: 10px;
            }

            .logo {
                width: 100px;
                height: 100px;
            }
        }
    </style>
</head>
<body>
    <div class="particles" id="particles"></div>

    <div class="container">
        <div class="header-section">
            <img src="https://i.postimg.cc/mg8JJZCC/unnamed.webp" alt="Logo" class="logo">
            <h1>مدير شارات HypeSquad</h1>
            <p>إدارة شارات ديسكورد بكل سهولة وأمان</p>
        </div>

        <div class="card">
            <div class="card-header">
                <h3> دخول الحساب</h3>
            </div>
            <div class="card-body">
                <div class="form-group" id="loginSection">
                    <label for="token">توكن ديسكورد:</label>
                    <div class="input-wrapper">
                        <input type="password" id="token" placeholder="أدخل توكن الديسكورد..." autocomplete="off">
                        <button id="toggleToken" class="toggle-btn" title="إظهار/إخفاء">👁️</button>
                    </div>
                </div>

                <div id="profileSection" class="profile-section">
                    <div class="profile-card">
                        <img id="userAvatar" src="" alt="Avatar" class="profile-avatar">
                        <div class="profile-info">
                            <span class="profile-label">متصل ك:</span>
                            <h3 id="username">المستخدم</h3>
                        </div>
                        <button id="logoutBtn" class="logout-btn" title="تسجيل الخروج">❌</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="card">
            <div class="card-header">
                <h3> اختر الشارة المفضلة</h3>
            </div>
            <div class="card-body">
                <div class="badge-selection">
                    <div class="badge-options">
                        <div class="badge-option" data-house="2">
                            <div class="badge-icon">
                                <img src="https://i.postimg.cc/pr4HnWXm/65924-hypesquadbravery.png" alt="Bravery">
                            </div>
                            <span>Bravery</span>
                        </div>
                        <div class="badge-option" data-house="3">
                            <div class="badge-icon">
                                <img src="https://i.postimg.cc/MG5JmbKb/271697-houseofbrilliance.png" alt="Brilliance">
                            </div>
                            <span>Brilliance</span>
                        </div>
                        <div class="badge-option" data-house="1">
                            <div class="badge-icon">
                                <img src="https://i.postimg.cc/Qdg2jk5G/642689-houseofbalance.png" alt="Balance">
                            </div>
                            <span>Balance</span>
                        </div>
                    </div>

                    <div class="action-buttons">
                        <button id="setBadge" class="btn btn-add" disabled>إضافة الشارة</button>
                        <button id="removeBadge" class="btn btn-remove">إزالة الشارة</button>
                    </div>

                    <div id="status" class="status"></div>
                    <div id="loading" class="loading">
                        <div class="spinner"></div>
                        <span>جاري المعالجة...</span>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script>
        // إنشاء نظام الجزيئات
        function createParticleSystem() {
            const container = document.getElementById('particles');
            const particleCount = 30;
            
            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 20 + 's';
                particle.style.animationDuration = (15 + Math.random() * 10) + 's';
                container.appendChild(particle);
            }
        }

        // تأثيرات الأزرار
        function addButtonEffects() {
            document.querySelectorAll('.btn').forEach(btn => {
                btn.addEventListener('click', function(e) {
                    const ripple = document.createElement('span');
                    ripple.className = 'ripple';
                    this.appendChild(ripple);
                    
                    const rect = this.getBoundingClientRect();
                    const size = Math.max(rect.width, rect.height);
                    ripple.style.width = ripple.style.height = size + 'px';
                    ripple.style.left = (e.clientX - rect.left - size / 2) + 'px';
                    ripple.style.top = (e.clientY - rect.top - size / 2) + 'px';
                    
                    setTimeout(() => ripple.remove(), 600);
                });
            });
        }

        document.addEventListener('DOMContentLoaded', () => {
            createParticleSystem();
            addButtonEffects();
        });
    </script>
    <script src="script.js"></script>
</body>
</html>
